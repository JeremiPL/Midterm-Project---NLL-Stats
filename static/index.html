<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLL Box Lacrosse Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-section">
                <h1>NLL Statistics</h1>
                <p class="subtitle">Player Statistics</p>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search players by name, team, or position..." 
                        class="search-input"
                    >
                    <button id="searchBtn" class="search-btn">Search</button>
                    <button id="resetBtn" class="reset-btn">Reset</button>
                </div>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label for="teamFilter" class="filter-label">Team</label>
                        <select id="teamFilter" class="filter-select">
                            <option value="all">All Teams</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="seasonFilter" class="filter-label">Season</label>
                        <select id="seasonFilter" class="filter-select">
                            <option value="all">All Seasons</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="positionFilter" class="filter-label">Position</label>
                        <select id="positionFilter" class="filter-select">
                            <option value="all">All Positions</option>
                            <option value="FORWARD">Forward</option>
                            <option value="TRANSITION">Transition</option>
                            <option value="DEFENCE">Defence</option>
                            <option value="GOALTENDER">Goaltender</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="stats-section">
                <div class="stats-header">
                    <h2>Player Profiles</h2>
                    <p class="player-count">
                        <span id="playerCount">0</span> players found
                    </p>
                </div>

                <div id="loadingSpinner" class="loading">
                    <div class="spinner"></div>
                    <p>Loading player data...</p>
                </div>

                <div id="playerGrid" class="player-grid">
                    <!-- Players will be inserted here -->
                </div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-icon">📊</div>
                    <h3>No Players Found</h3>
                    <p>Try adjusting your search criteria</p>
                </div>
            </section>

            <!-- Player Detail Modal -->
            <div id="playerModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <div id="modalBody" class="modal-body">
                        <!-- Detailed player info will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 National Lacrosse League Stats Tracker | The Premier Indoor Lacrosse League</p>
    </footer>

    <script src="script.js?v=20260422-2"></script>
</body>
</html>
