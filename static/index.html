<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLL Box Lacrosse Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-section">
                <h1>🥍 NLL Box Lacrosse Stats</h1>
                <p class="subtitle">National Lacrosse League Player Statistics</p>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search players by name, team, or position..." 
                        class="search-input"
                    >
                    <button id="searchBtn" class="search-btn">Search</button>
                    <button id="resetBtn" class="reset-btn">Reset</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Players</button>
                    <button class="filter-btn" data-filter="position-forward">Forward</button>
                    <button class="filter-btn" data-filter="position-transition">Transition</button>
                    <button class="filter-btn" data-filter="position-defence">Defence</button>
                    <button class="filter-btn" data-filter="position-goaltender">Goaltender</button>
                </div>
            </section>

            <section class="stats-section">
                <div class="stats-header">
                    <h2>Player Statistics</h2>
                    <p class="player-count">
                        <span id="playerCount">0</span> players found
                    </p>
                </div>

                <div id="loadingSpinner" class="loading">
                    <div class="spinner"></div>
                    <p>Loading player data...</p>
                </div>

                <div id="playerGrid" class="player-grid">
                    <!-- Players will be inserted here -->
                </div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-icon">📊</div>
                    <h3>No Players Found</h3>
                    <p>Try adjusting your search criteria</p>
                </div>
            </section>

            <!-- Player Detail Modal -->
            <div id="playerModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <div id="modalBody" class="modal-body">
                        <!-- Detailed player info will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 National Lacrosse League Stats Tracker | The Premier Indoor Lacrosse League</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
